<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afterlife Metro - Game</title>
  <link rel="stylesheet" href="game.css">
</head>
<body>
  <div class="game-shell">
    <iframe id="game-frame" src="Afterlife-Metro/Afterlife-metro-godot-Newt.html" title="Afterlife Metro Game"></iframe>

    <div id="fade-overlay">Starting...</div>
    <div id="timer-display">00:00.000</div>
    <button id="pause-btn" type="button">Pause</button>
    <button id="end-game-btn" type="button">End Game</button>
  </div>

  <div id="pause-menu-backdrop">
    <div id="pause-menu">
      <h2>Paused</h2>
      <div class="pause-actions">
        <button class="pause-resume" type="button" id="resume-btn">Resume</button>
        <button class="pause-quit" type="button" id="quit-btn">Quit to Home</button>
      </div>
    </div>
  </div>

  <div id="modal-backdrop">
    <div id="modal">
      <h2>End Game</h2>
      <div class="time-preview" id="final-time">Time: 00:00.000</div>
      <p>Enter your team name to save your time.</p>
      <input id="team-input" type="text" name="team" placeholder="Team name" maxlength="40" autocomplete="off" />
      <div class="modal-actions">
        <button class="btn-secondary" type="button" id="cancel-modal">Cancel</button>
        <button class="btn-primary" type="button" id="submit-modal">Save</button>
      </div>
    </div>
  </div>

  <script src="timer.js"></script>
  <script src="pause-menu.js"></script>
  <script src="end-game-modal.js"></script>
  <script src="game.js"></script>
</body>
</html>
