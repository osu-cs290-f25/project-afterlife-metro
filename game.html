<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Afterlife Metro - Game</title>
  <style>
    :root {
      --overlay-duration: 3s;
      --ui-padding: 16px;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
      color: white;
    }

    body {
      position: relative;
    }

    .game-shell {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    #game-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Black overlay that blocks interaction until fade completes */
    #fade-overlay {
      position: absolute;
      inset: 0;
      background: black;
      opacity: 1;
      pointer-events: all;
      animation: fadeOut var(--overlay-duration) ease-in forwards;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      letter-spacing: 2px;
    }

    @keyframes fadeOut {
      0% { opacity: 1; }
      100% { opacity: 0; }
    }

    /* Timer display */
    #timer-display {
      position: absolute;
      top: var(--ui-padding);
      left: var(--ui-padding);
      background: rgba(0, 0, 0, 0.55);
      padding: 10px 16px;
      border-radius: 8px;
      font-size: 22px;
      font-weight: bold;
      z-index: 2;
      pointer-events: none;
      min-width: 140px;
      text-align: center;
    }

    /* End Game button */
    #end-game-btn {
      position: absolute;
      bottom: var(--ui-padding);
      left: 50%;
      transform: translateX(-50%);
      padding: 14px 26px;
      font-size: 18px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      cursor: pointer;
      z-index: 2;
    }

    #end-game-btn:hover {
      background: #fff;
    }

    /* Pause button */
    #pause-btn {
      position: absolute;
      top: var(--ui-padding);
      right: var(--ui-padding);
      padding: 10px 16px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.9);
      color: #111;
      cursor: pointer;
      z-index: 2;
    }

    #pause-btn:hover {
      background: #fff;
    }

    /* Pause menu overlay */
    #pause-menu-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 4;
    }

    #pause-menu {
      background: #101010;
      border-radius: 10px;
      padding: 30px;
      width: 300px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    #pause-menu h2 {
      margin: 0 0 24px;
      font-size: 28px;
    }

    .pause-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pause-actions button {
      padding: 12px 16px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
    }

    .pause-resume {
      background: #ffd700;
      color: #111;
    }

    .pause-resume:hover {
      background: #ffed4e;
    }

    .pause-quit {
      background: #666;
      color: #fff;
    }

    .pause-quit:hover {
      background: #888;
    }

    /* Modal */
    #modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 4;
    }

    #modal {
      background: #101010;
      border-radius: 10px;
      padding: 24px;
      width: 320px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.4);
      text-align: center;
    }

    #modal h2 {
      margin: 0 0 12px;
      font-size: 22px;
    }

    #modal p {
      margin: 0 0 16px;
      font-size: 14px;
      color: #ccc;
    }

    #team-input {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #333;
      background: #1a1a1a;
      color: white;
      margin-bottom: 14px;
      box-sizing: border-box;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    .modal-actions button {
      padding: 10px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .btn-secondary {
      background: #333;
      color: #fff;
    }

    .btn-primary {
      background: #ffd700;
      color: #111;
      font-weight: 700;
    }

    .time-preview {
      font-size: 16px;
      font-weight: bold;
      margin-bottom: 10px;
      color: #ffd700;
    }
  </style>
</head>
<body>
  <div class="game-shell">
    <iframe id="game-frame" src="Afterlife-Metro/Afterlife-metro-godot-Newt.html" title="Afterlife Metro Game"></iframe>

    <div id="fade-overlay">Starting...</div>
    <div id="timer-display">00:00.000</div>
    <button id="pause-btn" type="button">Pause</button>
    <button id="end-game-btn" type="button">End Game</button>
  </div>

  <div id="pause-menu-backdrop">
    <div id="pause-menu">
      <h2>Paused</h2>
      <div class="pause-actions">
        <button class="pause-resume" type="button" id="resume-btn">Resume</button>
        <button class="pause-quit" type="button" id="quit-btn">Quit to Home</button>
      </div>
    </div>
  </div>

  <div id="modal-backdrop">
    <div id="modal">
      <h2>End Game</h2>
      <div class="time-preview" id="final-time">Time: 00:00.000</div>
      <p>Enter your team name to save your time.</p>
      <input id="team-input" type="text" name="team" placeholder="Team name" maxlength="40" autocomplete="off" />
      <div class="modal-actions">
        <button class="btn-secondary" type="button" id="cancel-modal">Cancel</button>
        <button class="btn-primary" type="button" id="submit-modal">Save & Return</button>
      </div>
    </div>
  </div>

  <script src="timer.js"></script>
  <script src="pause-menu.js"></script>
  <script src="end-game-modal.js"></script>
  <script>
    (() => {
      const overlay = document.getElementById('fade-overlay');
      const timerDisplay = document.getElementById('timer-display');
      const pauseBtn = document.getElementById('pause-btn');
      const endBtn = document.getElementById('end-game-btn');

      // Initialize modules
      PauseMenu.init();
      EndGameModal.init();

      // Setup callbacks
      PauseMenu.setOnResume(() => {
        Timer.resume((ms) => {
          timerDisplay.textContent = Timer.formatTime(ms);
        });
      });

      PauseMenu.setOnQuit(() => {
        window.location.href = 'homescreen.html';
      });

      EndGameModal.setOnCancel(() => {
        Timer.resume((ms) => {
          timerDisplay.textContent = Timer.formatTime(ms);
        });
      });

      EndGameModal.setOnSubmit((team, timeMs) => {
        submitScore(team, timeMs);
      });

      const submitScore = async (team, timeMs) => {
        const payload = { team, timeMs, createdAt: new Date().toISOString() };
        try {
          const res = await fetch('/api/scores', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          if (!res.ok) throw new Error('Failed to save score');
          window.location.href = 'homescreen.html';
        } catch (err) {
          alert('Could not save score. Please try again.');
          console.error(err);
        }
      };

      // Handle fade overlay end -> enable play and start timer
      overlay.addEventListener('animationend', () => {
        overlay.remove();
        Timer.start((ms) => {
          timerDisplay.textContent = Timer.formatTime(ms);
        });
      });

      // Button event listeners
      pauseBtn.addEventListener('click', () => {
        if (!PauseMenu.isPausedState()) {
          Timer.pause();
          PauseMenu.open();
        }
      });

      endBtn.addEventListener('click', () => {
        const finalMs = Timer.pause();
        EndGameModal.open(finalMs);
      });

      // Safety: prevent overlay from blocking if animation doesn't fire
      window.addEventListener('load', () => {
        setTimeout(() => {
          if (overlay.isConnected) {
            overlay.remove();
            Timer.start((ms) => {
              timerDisplay.textContent = Timer.formatTime(ms);
            });
          }
        }, 3500);
      });
    })();
  </script>
</body>
</html>
